<!DOCTYPE html>
<html>

<head>
    <title>{{ model.upper() }}</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <style>

        body{
            background-color:#111;
            color:white;
            font-family:Arial;
            padding:30px;
        }

        h1{
            text-align:center;
            color:#00ffcc;
        }

        .tree-container{
            text-align:center;
            margin-top:30px;
        }

        .tree-img{
            width:90%;
            border-radius:10px;
            border:2px solid #444;
        }

        .description{
            margin-top:40px;
            background:#1e1e1e;
            padding:25px;
            border-radius:10px;
            line-height:1.8;
            white-space:pre-line;
        }

        a{
            color:#00ffcc;
            text-decoration:none;
            font-size:18px;
        }

    </style>

</head>

<body>

    <a href="/">⬅ Back</a>

    <h1>{{ model.upper() }} Decision Tree</h1>

    <div class="tree-container">

        <img src="{{ url_for('static', filename=image) }}" class="tree-img">

    </div>

    <div class="description">

        <h2>Description</h2>

        <p>{{ description }}</p>

    </div>

</body>

</html>
